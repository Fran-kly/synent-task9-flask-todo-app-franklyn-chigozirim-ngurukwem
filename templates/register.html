<!doctype html>
<html>
  <head>
    <title>Register</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 25px;
        border-radius: 12px;
        width: 300px;
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      input {
        padding: 10px;
        width: 80%;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        padding: 10px;
        width: 85%;
        border: none;
        background: #28a745;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      a {
        display: block;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Register</h2>

      <form method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button>Register</button>
      </form>

      <a href="/login">Already have an account? Login</a>
    </div>
  </body>
</html>
